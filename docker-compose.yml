version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - dgstn_net

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
      - media_data:/code/media
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - dgstn_net
      - npm_network

networks:
  dgstn_net:
    driver: bridge
  npm_network:
    external: true
    name: npm_network

volumes:
  postgres_data:
  media_data:
